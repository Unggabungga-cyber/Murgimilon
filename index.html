<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Find Murgi Milon!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0d0d1a;
      font-family: 'Outfit', Arial, sans-serif;
      color: white;
      overflow: hidden;
    }

    /* Animated background blobs */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      pointer-events: none;
      z-index: 0;
      animation: blobMove 8s ease-in-out infinite alternate;
    }
    body::before {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #7c3aed, transparent);
      top: -150px; left: -150px;
    }
    body::after {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #00b894, transparent);
      bottom: -120px; right: -100px;
      animation-delay: -4s;
    }
    @keyframes blobMove {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(40px, 30px) scale(1.1); }
    }

    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      padding: 20px;
      width: 100%;
      max-width: 700px;
    }

    .game-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 36px 32px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      backdrop-filter: blur(12px);
      box-shadow: 0 8px 48px rgba(0,0,0,0.5);
    }

    h1 {
      font-size: clamp(22px, 5vw, 32px);
      font-weight: 900;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #a78bfa, #00ff99);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .timer-bar-wrap {
      width: 100%;
      height: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 99px;
      overflow: hidden;
    }
    .timer-bar {
      height: 100%;
      background: linear-gradient(90deg, #7c3aed, #00ff99);
      border-radius: 99px;
      width: 100%;
      transform-origin: left;
      transition: none;
    }
    .timer-bar.animate {
      animation: timerShrink 2s linear forwards;
    }
    @keyframes timerShrink {
      from { width: 100%; }
      to   { width: 0%; }
    }

    #score {
      font-size: 18px;
      font-weight: 700;
      color: #00ff99;
      letter-spacing: 1px;
    }

    #status {
      font-size: 15px;
      color: #b0b0cc;
      text-align: center;
      max-width: 460px;
      line-height: 1.5;
      min-height: 44px;
      transition: color 0.3s;
    }

    #board {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      width: 100%;
      min-height: 90px; /* prevent layout collapse between shuffles */
    }

    .char-btn {
      flex: 1 1 100px;
      max-width: 140px;
      min-width: 100px;
      height: 140px;
      background: linear-gradient(145deg, #2a2a45, #1e1e35);
      color: white;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      font-size: 12px;
      font-weight: 700;
      font-family: 'Outfit', Arial, sans-serif;
      cursor: pointer;
      transition: transform 0.15s cubic-bezier(.34,1.56,.64,1),
                  background 0.15s, border-color 0.15s, box-shadow 0.15s;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 6px;
    }
    .char-btn img {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid rgba(255,255,255,0.15);
      pointer-events: none;
    }
    .char-btn span {
      pointer-events: none;
      text-align: center;
      line-height: 1.2;
    }
    .char-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.07), transparent);
      pointer-events: none;
    }
    .char-btn:hover:not(:disabled) {
      transform: translateY(-4px) scale(1.06);
      background: linear-gradient(145deg, #3c3c62, #2b2b4a);
      border-color: rgba(167,139,250,0.4);
      box-shadow: 0 8px 24px rgba(124,58,237,0.3);
    }
    .char-btn:active:not(:disabled) {
      transform: scale(0.97);
    }
    .char-btn:disabled {
      cursor: default;
      background: linear-gradient(145deg, #3a1a1a, #2a1212);
      border-color: rgba(255,100,100,0.2);
      opacity: 0.7;
    }
    .char-btn.correct {
      background: linear-gradient(145deg, #064e3b, #065f46);
      border-color: rgba(0,255,153,0.4);
      box-shadow: 0 0 20px rgba(0,255,153,0.3);
    }

    #restartBtn {
      padding: 12px 32px;
      font-size: 15px;
      font-weight: 700;
      font-family: 'Outfit', Arial, sans-serif;
      background: linear-gradient(135deg, #7c3aed, #00b894);
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      display: none;
      letter-spacing: 0.5px;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
      box-shadow: 0 4px 20px rgba(124,58,237,0.4);
    }
    #restartBtn:hover {
      transform: translateY(-2px) scale(1.04);
      box-shadow: 0 8px 28px rgba(124,58,237,0.5);
    }

    .best-score {
      font-size: 13px;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.5px;
    }
    .best-score span {
      color: #a78bfa;
      font-weight: 700;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="game-card">
    <h1>🔍 Find Murgi Milon!</h1>
    <h1>মুরগি মিলনকে খুঁজে বের করুন সময় ২ সেকেন্ড!</h1>
    

    <div class="timer-bar-wrap">
      <div class="timer-bar" id="timerBar"></div>
    </div>

    <div id="score">Score: 0</div>
    <div id="status">Click on <strong>Murgi Milon</strong> before the timer runs out!</div>

    <div id="board">
      <button class="char-btn"></button>
      <button class="char-btn"></button>
      <button class="char-btn"></button>
      <button class="char-btn"></button>
    </div>

    <button id="restartBtn" onclick="restart()">🔄 Try Again</button>

    <div class="best-score">Best: <span id="bestScore">0</span></div>
  </div>
</div>

<script>
  const CHARACTERS  = ["Murgi Milon", "Chumma_Shafiq", "Shama_Apa", "Talka_Fuad"];
  const TARGET      = "Murgi Milon";
  const INTERVAL_MS = 2000;

  // Map character names to their photo filenames
  const PHOTO_MAP = {
    "Murgi Milon":   "MurgiMilon.jpeg",
    "Chumma_Shafiq":    "Chumma_Shafiq.jpeg",
    "Shama_Apa":  "Shama_Apa.jpeg",
    "Talka_Fuad": "Takla_Fuad.jpeg"
  };

  let score     = 0;
  let bestScore = 0;
  let gameOver  = false;
  let timerId   = null;

  const board      = document.getElementById("board");
  const scoreEl    = document.getElementById("score");
  const statusEl   = document.getElementById("status");
  const restartBtn = document.getElementById("restartBtn");
  const timerBar   = document.getElementById("timerBar");
  const bestEl     = document.getElementById("bestScore");

  /* ── helpers ── */
  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function resetTimer() {
    // Restart the CSS animation by cloning the element
    timerBar.classList.remove("animate");
    void timerBar.offsetWidth; // force reflow
    timerBar.classList.add("animate");
  }

  /* ── core game ── */
  const buttons = Array.from(board.querySelectorAll(".char-btn"));

  function renderBoard() {
    if (gameOver) return;
    const order = shuffle(CHARACTERS);
    // Reuse existing buttons — never clear innerHTML, so layout never collapses
    buttons.forEach((btn, i) => {
      const name = order[i];
      btn.innerHTML = '<img src="' + PHOTO_MAP[name] + '" alt="' + name + '"><span>' + name + '</span>';
      btn.disabled = false;
      btn.className = "char-btn";
      btn.onclick = () => handleClick(name);
    });
    resetTimer();
    clearTimeout(timerId);
    timerId = setTimeout(() => endGame(null), INTERVAL_MS);
  }

  function handleClick(name) {
    if (gameOver) return;
    if (name === TARGET) {
      score++;
      scoreEl.textContent = "Score: " + score;
      statusEl.textContent = "✅ Nice catch! Keep going...";
      statusEl.style.color = "#00ff99";
      clearTimeout(timerId);
      renderBoard();
    } else {
      endGame(name);
    }
  }

  function endGame(wrongName) {
    gameOver = true;
    clearTimeout(timerId);

    // Clear timer bar — no color when game is over
    timerBar.classList.remove("animate");
    timerBar.style.width = "0%";

    // Disable all buttons, highlight the correct one
    buttons.forEach(b => {
      b.disabled = true;
      const span = b.querySelector('span');
      if (span && span.textContent === TARGET) b.classList.add("correct");
    });

    statusEl.style.color = "#ff6b6b";
    if (wrongName) {
      statusEl.innerHTML =
        '❌ You clicked <strong>"' + wrongName + '"</strong> — that\'s not Murgi Milon!<br>' +
        "Game Over — Final Score: <strong>" + score + "</strong>";
    } else {
      statusEl.innerHTML =
        '⏱ Time\'s up! You didn\'t click anything.<br>' +
        "Game Over — Final Score: <strong>" + score + "</strong>";
    }

    if (score > bestScore) {
      bestScore = score;
      bestEl.textContent = bestScore;
    }

    restartBtn.style.display = "inline-block";
  }

  function restart() {
    score    = 0;
    gameOver = false;
    scoreEl.textContent    = "Score: 0";
    statusEl.style.color   = "#b0b0cc";
    statusEl.innerHTML     = "Click on <strong>Murgi Milon</strong> before the timer runs out!";
    restartBtn.style.display = "none";
    timerBar.style.width = "";
    renderBoard();
  }

  renderBoard();
</script>
</body>
</html>
